name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-homeassistant-custom-component
          pip install pymammotion==0.7.55 dbus_fast

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ tests/integration/ -v --tb=short \
            --cov --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Enforce coverage threshold
        run: |
          pytest tests/unit/ tests/integration/ --cov --cov-fail-under=70 -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
